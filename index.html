<!DOCTYPE html>
<html>
<head>
<title>FitBuddy AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💪 FitBuddy AI</h1>
<h2>AI Fitness Planner</h2>

<p>Enter your goal:</p>

<input id="goal" placeholder="weight loss / muscle gain">

<button onclick="getPlan()">Generate Plan</button>

<p id="result"></p>

<script>
function getPlan() {
let goal = document.getElementById("goal").value;

fetch("/generate", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({goal: goal})
})
.then(response => response.json())
.then(data => {
document.getElementById("result").innerText = data.plan;
});
}
</script>

</body>
</html>
